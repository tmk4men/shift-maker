<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KINMATE（キンメイト）｜希望を集めてシフト表をつくるアプリ</title>
<meta name="description" content="スタッフから希望を集めて、1か月分のシフト表を自動で作成します。希望休と労働基準法を守りながら、必要な人数をそろえます。無料。">
<meta name="theme-color" content="#f4f8ea" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#211f1c" media="(prefers-color-scheme: dark)">

<!-- OGP -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="KINMATE">
<meta property="og:title" content="KINMATE（キンメイト）｜希望を集めてシフト表をつくるアプリ">
<meta property="og:description" content="希望休と法律を守りながら、1か月分のシフト表を自動で作成します。無料。">
<meta property="og:locale" content="ja_JP">

<meta name="twitter:title" content="KINMATE（キンメイト）｜希望を集めてシフト表をつくるアプリ">
<meta name="twitter:description" content="希望休と法律を守りながら、1か月分のシフト表を自動で作成します。無料。">

<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>

<header class="app-header">
  <h1 class="sr-only">KINMATE</h1>
  <div class="brand">
    <span class="logo" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 64 64">
        <rect x="14" y="17" width="9" height="8" rx="2"/><rect x="27.5" y="17" width="9" height="8" rx="2" opacity=".45"/><rect x="41" y="17" width="9" height="8" rx="2"/>
        <rect x="14" y="28" width="9" height="8" rx="2" opacity=".45"/><rect x="27.5" y="28" width="9" height="8" rx="2"/><rect x="41" y="28" width="9" height="8" rx="2" opacity=".45"/>
        <rect x="14" y="39" width="9" height="8" rx="2"/><rect x="27.5" y="39" width="9" height="8" rx="2" opacity=".45"/><rect x="41" y="39" width="9" height="8" rx="2"/>
      </svg>
    </span>
  </div>

  <div class="tabs" id="tabs">
    <label class="sr-only" for="tabSelect">いまの作業</label>
    <select class="step-select" id="tabSelect">
      <option value="setup">1. 準備</option>
      <option value="staff">2. スタッフ</option>
      <option value="request">3. 希望を集める</option>
      <option value="shift">4. シフト表</option>
      <option value="summary">5. 集計</option>
    </select>
  </div>

  <div class="header-actions">
    <button id="btnMenu" class="btn ghost menu-btn" aria-label="メニュー" title="使い方・データ">
      <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
        <rect x="3" y="6"  width="18" height="2" rx="1"/>
        <rect x="3" y="11" width="18" height="2" rx="1"/>
        <rect x="3" y="16" width="18" height="2" rx="1"/>
      </svg>
    </button>
  </div>
</header>

<nav class="modes" id="modes" aria-label="使う人を選ぶ">
  <button class="mode" data-mode="input">
    <span class="mode-t">シフト希望を出す</span>
    <span class="mode-s">スタッフの方はこちら</span>
  </button>
  <button class="mode active" data-mode="manage">
    <span class="mode-t">シフトを作る</span>
    <span class="mode-s">責任者の方はこちら</span>
  </button>
</nav>

<main id="main">
  <section class="panel hidden" id="panel-input"></section>
  <section class="panel" id="panel-setup"></section>
  <section class="panel hidden" id="panel-staff"></section>
  <section class="panel hidden" id="panel-request"></section>
  <section class="panel hidden" id="panel-shift"></section>
  <section class="panel hidden" id="panel-summary"></section>
</main>

<div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-box" tabindex="-1">
    <div class="modal-head"><h3 id="modalTitle">タイトル</h3><button id="modalClose" class="btn ghost" aria-label="閉じる">✕</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

<script src="js/util.js?v=4"></script>
<script src="js/store.js?v=4"></script>
<script src="js/rules.js?v=4"></script>
<script src="js/solver.js?v=4"></script>
<script src="js/image.js?v=4"></script>
<script src="js/ui.js?v=4"></script>
</body>
</html>
