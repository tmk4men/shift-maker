<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="theme-color" content="#f7f5f2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#211f1c" media="(prefers-color-scheme: dark)">

<!-- X (Twitter) -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="シフト自動作成｜労働基準法と現場ルールで組むシフト作成アプリ">
<meta name="twitter:description" content="希望休と法令を守りながらシフトを自動作成。AI不使用・端末内で完結・無料。">

<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header">
  <div class="brand">
    <span class="logo" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 64 64">
        <rect x="14" y="17" width="9" height="8" rx="2"/><rect x="27.5" y="17" width="9" height="8" rx="2" opacity=".45"/><rect x="41" y="17" width="9" height="8" rx="2"/>
        <rect x="14" y="28" width="9" height="8" rx="2" opacity=".45"/><rect x="27.5" y="28" width="9" height="8" rx="2"/><rect x="41" y="28" width="9" height="8" rx="2" opacity=".45"/>
        <rect x="14" y="39" width="9" height="8" rx="2"/><rect x="27.5" y="39" width="9" height="8" rx="2" opacity=".45"/><rect x="41" y="39" width="9" height="8" rx="2"/>
      </svg>
    </span>
    <div>
      <h1>シフト自動作成</h1>
      <p class="sub">ルールブック方式・AI不使用・端末内で完結</p>
    </div>
  </div>
  <div class="header-actions">
    <input type="file" id="fileImport" accept="application/json" hidden>
    <input type="file" id="fileRequests" accept="application/json,.json" multiple hidden>
    <button id="btnMenu" class="btn ghost menu-btn" aria-label="メニュー" title="使い方・データ">
      <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
        <rect x="3" y="6"  width="18" height="2" rx="1"/>
        <rect x="3" y="11" width="18" height="2" rx="1"/>
        <rect x="3" y="16" width="18" height="2" rx="1"/>
      </svg>
    </button>
  </div>
</header>

<nav class="modes" id="modes" aria-label="使う人を選ぶ">
  <button class="mode" data-mode="input">
    <span class="mode-t">シフト希望を出す</span>
    <span class="mode-s">スタッフの方はこちら</span>
  </button>
  <button class="mode active" data-mode="manage">
    <span class="mode-t">シフトを作る</span>
    <span class="mode-s">責任者の方はこちら</span>
  </button>
</nav>

<nav class="tabs" id="tabs">
  <button class="tab active" data-tab="setup">1. 準備</button>
  <button class="tab" data-tab="staff">2. スタッフ</button>
  <button class="tab" data-tab="request">3. 希望を集める</button>
  <button class="tab" data-tab="shift">4. シフト表</button>
  <button class="tab" data-tab="summary">5. 集計</button>
</nav>

<main id="main">
  <section class="panel hidden" id="panel-input"></section>
  <section class="panel" id="panel-setup"></section>
  <section class="panel hidden" id="panel-staff"></section>
  <section class="panel hidden" id="panel-request"></section>
  <section class="panel hidden" id="panel-shift"></section>
  <section class="panel hidden" id="panel-summary"></section>
</main>

<div id="modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-head"><h3 id="modalTitle">タイトル</h3><button id="modalClose" class="btn ghost">✕</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="js/util.js"></script>
<script src="js/store.js"></script>
<script src="js/rules.js"></script>
<script src="js/solver.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
